version: "3.9"

services:
  ml:
    build: .
    container_name: mon-projet-ml
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./src:/app/src
      - ./configs:/app/configs
    command: python -m src.models.train
    # Décommente pour utiliser un GPU (nécessite nvidia-container-toolkit) :
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  notebook:
    build: .
    container_name: mon-projet-ml-notebook
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root

  api:
    build: .
    container_name: mon-projet-ml-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./configs:/app/configs
      - ./src:/app/src
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  streamlit:
    build: .
    container_name: mon-projet-ml-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    command: python -m streamlit run src/app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
