# =============================================================================
# Configuration du projet — UNIQUEMENT des variables non-secrètes.
# Les secrets (tokens, credentials) restent en variables d'environnement
# (GitHub Secrets en CI, .env en local) — jamais dans ce fichier.
# =============================================================================

paths:
  data:
    raw: "data/raw"
    interim: "data/interim"
    processed: "data/processed"
    external: "data/external"
  models: "models"
  models_history: "models/history"
  reports: "reports"
  processed_filename: "dataset_clean.csv"
  model_filename: "model.joblib"
  predictions_filename: "reports/predictions.csv"

# -----------------------------------------------------------------------------
# Stockage S3 partagé (src/data/make_dataset.py — upload_file_to_s3)
# Un seul bucket pour tous les fichiers persistés depuis l'instance GPU
# éphémère. Structure de clé : {prefix}/{année}/{mois}/{nom}_{AAAAMMJJ}.csv
# Credentials (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY) en variables
# d'environnement uniquement — jamais dans ce fichier.
# -----------------------------------------------------------------------------
s3:
  bucket: "mon-projet-ml-data"
  prefixes:
    processed: "processed/dataset_clean"
    weather: "external/meteo"

# -----------------------------------------------------------------------------
# API d'inférence (src/api/) + interface Streamlit (src/app/)
# -----------------------------------------------------------------------------
api:
  host: "0.0.0.0"
  port: 8000
  # Source du modèle servi par l'API : "local" | "s3" | "mlflow"
  model_source: "mlflow"
  s3:
    bucket: "mon-projet-ml-data"
    key: "models/model.joblib"
  # Pas de section mlflow ici -- api.model_source="mlflow" réutilise
  # directement mlflow.registered_model_name et mlflow.model_alias
  # (section mlflow: plus haut), pour ne jamais désynchroniser le nom
  # utilisé à l'enregistrement (train.py) et au chargement (model_loader.py).

streamlit:
  # Surchargée par la variable d'environnement API_URL si définie
  # (utile en Docker Compose, où l'API n'est pas sur localhost).
  api_url: "http://localhost:8000"

# -----------------------------------------------------------------------------
# Génération du dataset synthétique (src/data/make_dataset.py)
# À supprimer une fois une vraie source de données branchée.
# -----------------------------------------------------------------------------
data:
  synthetic:
    n_samples: 500
    random_state: 42
    date_range:
      start: "2026-01-01"
      end: "2026-06-30"

# -----------------------------------------------------------------------------
# Données externes — météo (src/data/make_dataset.py)
# -----------------------------------------------------------------------------
external:
  weather:
    provider: "open-meteo"
    api_url: "https://archive-api.open-meteo.com/v1/archive"
    timezone: "Europe/Paris"
    daily_variables:
      - "temperature_2m_max"
      - "temperature_2m_min"
      - "precipitation_sum"
    cache_file: "data/external/meteo.csv"
    regions:
      Nord:
        latitude: 50.63
        longitude: 3.06
      Sud:
        latitude: 43.30
        longitude: 5.37
      Est:
        latitude: 48.58
        longitude: 7.75
      Ouest:
        latitude: 47.22
        longitude: -1.55

# -----------------------------------------------------------------------------
# Modèle (src/models/train.py)
# -----------------------------------------------------------------------------
model:
  type: "LogisticRegression"
  params:
    max_iter: 1000
    random_state: 42
  features:
    numeric:
      - "age"
      - "revenu"
      - "anciennete_mois"
      - "revenu_par_annee_anciennete"
      - "revenu_par_age"
      - "temperature_max"
      - "temperature_min"
      - "precipitation"
    categorical:
      - "categorie"
      - "region"
      - "tranche_age"
      - "categorie_region"

# -----------------------------------------------------------------------------
# Entraînement (src/models/train.py)
# -----------------------------------------------------------------------------
training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  scoring: "accuracy"

# -----------------------------------------------------------------------------
# MLflow (src/models/train.py)
# Valeurs par défaut non-secrètes ; MLFLOW_TRACKING_URI en variable
# d'environnement prend toujours le dessus si elle est définie.
# -----------------------------------------------------------------------------
mlflow:
  experiment_name: "mon-projet-ml"
  default_tracking_uri: "https://ronan-guillou-mlflow-test.hf.space/"
  # Nom sous lequel train.py enregistre le modèle dans le Model Registry
  # MLflow (mlflow.sklearn.log_model(..., registered_model_name=...)).
  # Sans registration, l'API (api.mlflow) ne trouve rien -- "Registered
  # Model with name=... not found".
  registered_model_name: "mon-projet-ml"
  # Alias assigné à la dernière version entraînée (ex: "champion").
  # Les "stages" MLflow (Staging/Production) sont dépréciés depuis la
  # 2.9 au profit des alias -- voir mlflow.org/docs/latest/ml/model-registry/
  model_alias: "champion"

# -----------------------------------------------------------------------------
# HuggingFace (trigger_job.py, train.py, predict_model.py)
# Noms de repos et paramètres de job — pas de token ici.
# -----------------------------------------------------------------------------
huggingface:
  # ⚠️ À REMPLACER par ton vrai namespace HuggingFace (utilisateur ou organisation).
  # "mon-user" n'existe pas -- le laisser tel quel provoque des erreurs
  # d'upload (403/504) car ton HF_TOKEN n'a aucun droit sur ce namespace.
  model_repo: "ronan-guillou/mon-projet-ml"
  job_image: "pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime"
  job_flavor: "a10g-small"
  # Pas de "job_repo" : un Job HuggingFace n'a pas de repo, il reçoit un ID
  # généré automatiquement. Pour lancer sous un namespace précis (organisation),
  # utiliser la variable d'environnement HF_JOB_NAMESPACE (voir trigger_job.py) --
  # sinon le job s'exécute sous le compte associé à HF_TOKEN.
